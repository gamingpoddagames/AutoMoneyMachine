name: Update News

on:
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Run Main Program
        run: |
          python main.py
